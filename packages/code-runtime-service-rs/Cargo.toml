[package]
name = "code-runtime-service-rs"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
aes-gcm-siv = "0.11.1"
anyhow = "1.0.102"
axum = { version = "0.8.8", features = ["json", "macros", "ws"] }
base64 = "0.22.1"
clap = { version = "4.6.0", features = ["derive", "env"] }
globset = "0.4.18"
grep-regex = "0.1.14"
grep-searcher = "0.1.16"
ignore = "0.4.25"
reqwest = { version = "0.13.2", default-features = false, features = [
  "form",
  "json",
  "rustls",
  "stream",
] }
rusqlite = { version = "0.33.0", features = ["bundled"] }
rand = "0.10.0"
redis = { version = "1.0.5", features = ["tokio-comp"] }
sandbox-rs = { path = "../sandbox-rs" }
discovery-rs = { path = "../discovery-rs" }
ku0-runtime-diagnostics-export-core = { path = "../runtime-diagnostics-export-core-rs" }
ku0-runtime-shell-core = { path = "../runtime-shell-core-rs" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
httpdate = "1.0.3"
tokio = { version = "1.50.0", features = [
  "io-util",
  "macros",
  "process",
  "rt-multi-thread",
  "signal",
  "sync",
] }
tokio-stream = { version = "0.1.18", features = ["sync"] }
tokio-util = { version = "0.7.18", features = ["rt"] }
tower-http = { version = "0.6.8", features = ["cors", "trace"] }
time = { version = "0.3.47", features = ["formatting"] }
toml = "1.0.6"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
uuid = { version = "1.22.0", features = ["v4"] }
zip = "8.2.0"
futures-util = "0.3.32"

[dev-dependencies]
tempfile = "3"
tokio-tungstenite = "0.28.0"
tower = { version = "0.5.3", features = ["util"] }
