<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#212121" />
    <title>Fixture Host</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: rgb(33 33 33);
        color: rgb(236 236 236);
        font-family:
          "Sohne",
          "OpenAI Sans",
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      #root {
        min-height: 100dvh;
      }

      .app-boot-shell {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 0%, rgba(122, 183, 255, 0.16), transparent 34%),
          linear-gradient(180deg, rgba(33, 33, 33, 0.94), rgb(33 33 33));
      }

      .app-boot-card {
        width: min(520px, 100%);
        display: grid;
        gap: 10px;
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(47, 50, 56, 0.9), rgba(33, 33, 33, 0.94));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.36);
      }

      @media (prefers-reduced-motion: reduce) {
        .app-boot-card {
          animation: none;
        }
      }

      .app-boot-eyebrow {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
      }

      .app-boot-title {
        font-size: clamp(22px, 3vw, 30px);
        font-weight: 600;
        line-height: 1.1;
        color: rgb(255 255 255);
      }

      .app-boot-detail {
        max-width: 40ch;
        font-size: 14px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div
        aria-label="Launching workspace"
        aria-live="polite"
        class="app-boot-shell"
        data-app-boot="workspace"
        role="status"
      >
        <div class="app-boot-card">
          <span class="app-boot-eyebrow">HugeCode</span>
          <strong class="app-boot-title">Launching workspace</strong>
          <span class="app-boot-detail">Loading the workspace shell and runtime services.</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/fixtureMain.tsx"></script>
  </body>
</html>
