name: _reusable-ci-frontend-optimization

on:
  workflow_call:

jobs:
  frontend_optimization:
    name: frontend_optimization
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PW_WEBSERVER_TIMEOUT_MS: "900000"
      CODE_RUNTIME_SERVICE_READY_TIMEOUT_MS: "900000"
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: pnpm install --offline --frozen-lockfile

      - uses: ./.github/actions/setup-playwright

      - name: Frontend optimization gate
        run: pnpm validate:frontend-optimization
