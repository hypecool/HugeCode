name: Install Linux desktop dependencies
description: Install the Linux system packages required by desktop/Tauri and Playwright-enabled jobs.

runs:
  using: composite
  steps:
    - name: Install Linux desktop build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libssl-dev \
          libdbus-1-dev \
          xdg-utils \
          clang \
          pkg-config \
          patchelf
