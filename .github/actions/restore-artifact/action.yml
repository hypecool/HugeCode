name: Restore Workflow Artifact
description: Download a workflow artifact and optionally extract a zip payload.

inputs:
  name:
    description: Artifact name.
    required: true
  path:
    description: Destination path for the downloaded artifact.
    required: false
    default: "."
  unzip:
    description: Whether to unzip `<name>.zip` after download.
    required: false
    default: "false"
  zip-file:
    description: Zip filename to extract when unzip is enabled.
    required: false
    default: ""
  remove-zip:
    description: Whether to remove the zip file after extracting it.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}

    - name: Extract artifact zip
      if: inputs.unzip == 'true'
      shell: bash
      env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_ZIP_FILE: ${{ inputs.zip-file }}
        INPUT_REMOVE_ZIP: ${{ inputs.remove-zip }}
      run: |
        ZIP_FILE="${INPUT_ZIP_FILE}"
        if [ -z "$ZIP_FILE" ]; then
          ZIP_FILE="${INPUT_NAME}.zip"
        fi

        ZIP_PATH="${INPUT_PATH%/}/${ZIP_FILE}"
        unzip "$ZIP_PATH" -d "$INPUT_PATH"

        if [ "$INPUT_REMOVE_ZIP" = "true" ]; then
          rm -f "$ZIP_PATH"
        fi
