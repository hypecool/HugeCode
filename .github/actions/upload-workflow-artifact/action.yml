name: Upload Workflow Artifact
description: Upload a workflow artifact with shared defaults.

inputs:
  name:
    description: Artifact name.
    required: true
  path:
    description: File or directory path to upload.
    required: true
  retention-days:
    description: Artifact retention days.
    required: false
    default: "7"
  compression-level:
    description: Compression level passed to upload-artifact.
    required: false
    default: "6"
  if-no-files-found:
    description: Behavior when no files are found.
    required: false
    default: "warn"

runs:
  using: composite
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention-days }}
        compression-level: ${{ inputs.compression-level }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
