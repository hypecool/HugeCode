name: Setup Playwright
description: Restore Playwright browser cache and install browsers for E2E workflows.

inputs:
  cache-key-suffix:
    description: Additional cache key suffix
    required: false
    default: "-chromium"
  install-command:
    description: Command used to install Playwright browsers
    required: false
    default: "pnpm -C tests/e2e exec playwright install --with-deps chromium"

runs:
  using: composite
  steps:
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}${{ inputs.cache-key-suffix }}-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      shell: bash
      run: ${{ inputs.install-command }}
