name: Setup Linux Node workspace
description: Bootstrap Linux Node jobs that need desktop system dependencies, workspace install, and optional Playwright/browser setup.

inputs:
  install-command:
    description: Command used to install workspace dependencies
    required: false
    default: "pnpm ci:install:offline"
  setup-playwright:
    description: Whether to install Playwright browsers after dependencies are installed
    required: false
    default: "false"
  playwright-install-command:
    description: Command used to install Playwright browsers when enabled
    required: false
    default: "pnpm -C tests/e2e exec playwright install --with-deps chromium"
  build-command:
    description: Optional workspace build command to run after setup
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-node-pnpm
      with:
        install: "false"

    - uses: ./.github/actions/install-linux-desktop-deps

    - name: Prefetch dependencies
      shell: bash
      run: pnpm ci:fetch

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install-command }}

    - uses: ./.github/actions/setup-playwright
      if: ${{ inputs.setup-playwright == 'true' }}
      with:
        install-command: ${{ inputs.playwright-install-command }}

    - name: Build workspace
      if: ${{ inputs.build-command != '' }}
      shell: bash
      run: ${{ inputs.build-command }}
